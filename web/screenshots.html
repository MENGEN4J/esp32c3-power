/a&gt;&lt;/div&gt;&lt;div id=&quot;s3&quot; class=&quot;hidden&quot;&gt;&lt;h1&gt;输入密码&lt;/h1&gt;&lt;div style=&quot;background:#fff5f7;border:1px solid #fcc2d0;border-radius:12px;padding:14px;margin-bottom:18px;text-align:center&quot;&gt;&lt;p style=&quot;color:#9a3447;font-size:16px;font-weight:700&quot; id=&quot;sel-ssid&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;div class=&quot;input-group&quot;&gt;&lt;label&gt;WiFi 密码&lt;/label&gt;&lt;input type=&quot;password&quot; id=&quot;pwd&quot; placeholder=&quot;无密码网络可留空&quot;&gt;&lt;/div&gt;&lt;p class=&quot;tip&quot;&gt;密码只保存在设备本地，用于后续 OTA 检查；输入错误可返回重新选择网络。&lt;/p&gt;&lt;button class=&quot;btn btn-pink&quot; onclick=&quot;connect()&quot;&gt;连接&lt;/button&gt;&lt;a href=&quot;#&quot; onclick=&quot;showList();return false&quot; class=&quot;back-link&quot;&gt;返回选择其他WiFi&lt;/a&gt;&lt;/div&gt;&lt;div id=&quot;s4&quot; class=&quot;hidden&quot;&gt;&lt;h1&gt;正在连接&lt;/h1&gt;&lt;div class=&quot;loading&quot;&gt;&lt;div class=&quot;spinner&quot;&gt;&lt;/div&gt;&lt;p&gt;正在验证WiFi密码并连接...&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div id=&quot;s5&quot; class=&quot;hidden&quot;&gt;&lt;div class=&quot;result-box&quot;&gt;&lt;div class=&quot;icon&quot; style=&quot;color:#d64560&quot;&gt;&amp;#10004;&lt;/div&gt;&lt;h2 style=&quot;color:#d64560&quot;&gt;连接成功!&lt;/h2&gt;&lt;p id=&quot;conn-ip&quot;&gt;&lt;/p&gt;&lt;p style=&quot;margin-top:14px&quot;&gt;即将跳转到配置页面...&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;div id=&quot;s6&quot; class=&quot;hidden&quot;&gt;&lt;div class=&quot;result-box&quot;&gt;&lt;div class=&quot;icon&quot; style=&quot;color:#e66e7c&quot;&gt;&amp;#10008;&lt;/div&gt;&lt;h2 style=&quot;color:#e66e7c&quot;&gt;连接失败&lt;/h2&gt;&lt;p id=&quot;err-msg&quot; style=&quot;color:#e66e7c&quot;&gt;&lt;/p&gt;&lt;/div&gt;&lt;button class=&quot;btn btn-outline&quot; onclick=&quot;showList()&quot;&gt;重新选择&lt;/button&gt;&lt;/div&gt;&lt;div class=&quot;info-box&quot;&gt;&lt;p&gt;配网期间蓝牙暂停，完成后会自动重启恢复蓝牙。&lt;/p&gt;&lt;/div&gt;&lt;/div&gt;&lt;script&gt;var ssid=&qu
